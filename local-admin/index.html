<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OwO Blog Local Tools</title>
    <link rel="stylesheet" href="assets/css/admin.css">
  </head>
  <body>
    <header class="admin-header">
      <div>
        <p class="eyebrow">Local Only</p>
        <h1>OwO Blog 本地工具</h1>
      </div>
      <div class="header-actions">
        <a class="button ghost" href="/site/index.html" target="_blank">预览站点</a>
      </div>
    </header>
    <main class="admin-layout landing-layout">
      <a class="panel tool-card" href="/manage/">
        <p class="eyebrow">Manage</p>
        <h2>管理面板</h2>
        <p>查看文章列表，维护分类标签，删除文章或进入编辑。</p>
      </a>
      <a class="panel tool-card" href="/publish/">
        <p class="eyebrow">Publish</p>
        <h2>文章发布面板</h2>
        <p>撰写 Markdown 新文章，或通过管理面板进入已有文章编辑。</p>
      </a>
    </main>
  </body>
</html>
